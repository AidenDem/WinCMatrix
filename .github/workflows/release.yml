name: Release Program

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install MinGW on Windows
        run: choco install mingw
      - name: Run Makefile on Windows
        run: make
      - name: Upload build artifact from Windows
        uses: actions/upload-artifact@v4
        with:
          name: cmatrix-windows
          path: cmatrix.exe
      - name: Zip release
        run: Compress-Archive -Path cmatrix.exe -DestinationPath WinCMatrix.zip
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: wincmatrix@${{ github.ref_name }}
          generate_release_notes: true
          files: WinCMatrix.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}